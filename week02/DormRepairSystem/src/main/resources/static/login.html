<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>管理员登录</title>
    <style>
        .container {width: 400px; margin: 100px auto;}
        .form-group {margin: 20px 0;}
        label {display: inline-block; width: 80px;}
        input {width: 250px; padding: 5px;}
        button {padding: 8px 20px; cursor: pointer;}
    </style>
</head>
<body>
<div class="container">
    <h2>管理员登录</h2>
    <div class="form-group">
        <label>用户名：</label>
        <input type="text" id="username" value="admin">
    </div>
    <div class="form-group">
        <label>密&emsp;码：</label>
        <input type="password" id="password">
    </div>
    <button onclick="login()">登录</button>
    <div class="form-group" style="margin-top: 30px;">
        <label>Token：</label>
        <input type="text" id="token" readonly style="width: 350px;">
    </div>
</div>

<script>
    function login() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();

    if (!username || !password) {
        alert('请输入用户名和密码！');
        return;
    }

    //@RequestParam支持的表单格式
    const params = new URLSearchParams();
    params.append('username', username);
    params.append('password', password);

    fetch('http://localhost:8088/user/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
        body: params
    })
    .then(res => {
        console.log('响应状态：', res);
        if (!res.ok) return res.text().then(text => { throw new Error(text); });
        return res.json();
    })
    .then(data => {
        console.log('登录返回数据：', data);
        if (data.code === 200 && data.token) {
            document.getElementById('token').value = data.token;
            alert('✅ 登录成功！Token已生成，请复制到管理员端使用！');
        } else {
            alert('❌ 登录失败：' + (data.msg || '用户名或密码错误'));
        }
    })
    .catch(err => {
        console.error('请求错误：', err);
        alert('❌ 请求失败：' + err.message);
    });
}
</script>
</body>
</html>
